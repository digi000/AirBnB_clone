<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Task 8</title>
        <link rel="icon" href="images/icon.png">
        <link rel="stylesheet" href="styles/4-common.css">
        <link rel="stylesheet" href="styles/3-header.css">
        <link rel="stylesheet" href="styles/3-footer.css">
        <link rel="stylesheet" href="styles/6-filters.css">
        <link rel="stylesheet" href="styles/8-places.css">
    </head>
    <body>
        <header>
            <div class="logo">
            </div>
        </header>
        <div class="container">
            <section class="filters">
                <div class="locations">
                    <h3>States</h3>
                    <h4>Uganda, Kenya...</h4>
                    <div class="popover">
                        <ul>
                            <h2>Uganda:</h2>
                            <li>Kampala</li>
                            <li>Mbarara</li>
                        </ul>
                        <ul>
                            <h2>Kenya:</h2>
                            <li>Niarobi</li>
                            <li>Mbobasa</li>
                        </ul>
                    </div>
                </div>
                <div class="amenities">
                    <h3>Amenities</h3>
                    <h4>Internet, Kitchen...</h4>
                    <div class="popover">
                        <ul>
                            <li>Internet</li>
                            <li>TV</li>
                            <li>Kitchen</li>
                            <li>Iron</li>
                        </ul>
                    </div>
                </div>
                <button>Search</button>
            </section>
            <section class="places">
                <h1>Places</h1>
                <article>
                    <h2>My home</h2>
                </article>
                <article>
                    <h2>Tiny house</h2>
                </article>
                <article>
                    <h2>A suite</h2>
                </article>
                <div class="price_by_night">
                    <div class="information">
                        <div class="max_guest"></div>
                    </div>
                </div>
            </section>
        </div>
        <footer>
            Best School
        </footer>
    </body>
</html>
